<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cube Fill — Nouveau mot de passe</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="home">
  <div class="eyebrow" data-i18n="eyebrow"></div>
  <h1 style="font-size:2.2rem" data-i18n="resetTitle"></h1>

  <div id="checking" style="color:var(--text-dim); margin:20px 0" data-i18n="checkingLink"></div>

  <form id="resetPwForm" class="auth-form" style="display:none">
    <p id="forEmail" style="color:var(--text-dim); font-size:0.85rem"></p>
    <input type="password" id="newPassword" placeholder="••••••••" required minlength="6">
    <div class="strength-bar"><div id="strengthFill" class="strength-fill"></div></div>
    <p style="color:var(--text-dim); font-size:0.75rem" data-i18n="minChars"></p>
    <button type="submit" class="play-btn" data-i18n="saveBtn"></button>
  </form>

  <div id="invalidLink" style="display:none; color:var(--danger); margin:20px 0" data-i18n="invalidLink"></div>
  <div id="successMsg" style="display:none; color:var(--accent); margin:20px 0" data-i18n="resetSuccess"></div>

  <a href="account.html" class="back" data-i18n="back"></a>
</div>

<script src="lang.js"></script>
<script type="module">
import { auth } from "./firebase-init.js";
import { verifyPasswordResetCode, confirmPasswordReset } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";

const params = new URLSearchParams(window.location.search);
const oobCode = params.get('oobCode');

const checking = document.getElementById('checking');
const form = document.getElementById('resetPwForm');
const invalidLink = document.getElementById('invalidLink');
const successMsg = document.getElementById('successMsg');
const forEmail = document.getElementById('forEmail');

async function init() {
  if (!oobCode) {
    checking.style.display = 'none';
    invalidLink.style.display = 'block';
    return;
  }
  try {
    const email = await verifyPasswordResetCode(auth, oobCode);
    forEmail.textContent = (getLang() === 'fr' ? 'Pour le compte ' : 'For the account ') + email;
    checking.style.display = 'none';
    form.style.display = 'flex';
  } catch (err) {
    checking.style.display = 'none';
    invalidLink.style.display = 'block';
  }
}

document.getElementById('newPassword').addEventListener('input', (e) => {
  const val = e.target.value;
  let score = 0;
  if (val.length >= 6) score++;
  if (val.length >= 10) score++;
  if (/[0-9]/.test(val)) score++;
  if (/[^a-zA-Z0-9]/.test(val)) score++;
  const fill = document.getElementById('strengthFill');
  const colors = ['#fa7d7d', '#fa7d7d', '#facc7d', '#7dfacb', '#7dfacb'];
  fill.style.width = (score * 25) + '%';
  fill.style.background = colors[score];
});

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  try {
    await confirmPasswordReset(auth, oobCode, document.getElementById('newPassword').value);
    form.style.display = 'none';
    successMsg.style.display = 'block';
  } catch (err) {
    invalidLink.style.display = 'block';
    invalidLink.textContent = err.message;
  }
});

init();
</script>
</body>
</html>
