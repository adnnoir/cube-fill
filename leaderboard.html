<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cube Fill — Classement</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="home">
  <div class="eyebrow" data-i18n="eyebrow"></div>
  <h1 style="font-size:2.5rem" data-i18n="leaderboardTitle"></h1>

  <div id="loading" style="color:var(--text-dim); margin:30px 0" data-i18n="loadingBoard"></div>
  <table id="board" class="leaderboard-table" style="display:none">
    <thead>
      <tr>
        <th>#</th>
        <th data-i18n="pseudoCol"></th>
        <th data-i18n="niveau"></th>
        <th data-i18n="temps"></th>
      </tr>
    </thead>
    <tbody id="boardBody"></tbody>
  </table>
  <div id="emptyBoard" style="display:none; color:var(--text-dim); margin:30px 0" data-i18n="noScores"></div>

  <div style="margin-top:24px">
    <a href="account.html" class="back" data-i18n="accountLink"></a>
    &nbsp; · &nbsp;
    <a href="index.html" class="back" data-i18n="back"></a>
  </div>
</div>

<script src="lang.js"></script>
<script type="module">
import { auth, db } from "./firebase-init.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
import { collection, query, orderBy, limit, getDocs, doc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

let isAdmin = false;

onAuthStateChanged(auth, async (user) => {
  if (user) {
    const adminSnap = await getDoc(doc(db, "admins", user.uid));
    isAdmin = adminSnap.exists();
  } else {
    isAdmin = false;
  }
  loadBoard();
});

async function loadBoard() {
  const loading = document.getElementById('loading');
  const board = document.getElementById('board');
  const empty = document.getElementById('emptyBoard');
  const body = document.getElementById('boardBody');
  body.innerHTML = '';

  try {
    const q = query(collection(db, "scores"), orderBy("rankScore", "desc"), limit(50));
    const snap = await getDocs(q);

    loading.style.display = 'none';

    if (snap.empty) {
      empty.style.display = 'block';
      board.style.display = 'none';
      return;
    }

    empty.style.display = 'none';
    board.style.display = 'table';
    let rank = 1;
    snap.forEach((docSnap) => {
      const d = docSnap.data();
      const row = document.createElement('tr');
      const deleteCell = isAdmin
        ? `<td><button class="admin-delete" data-uid="${docSnap.id}" title="${getLang() === 'fr' ? 'Supprimer' : 'Delete'}">✕</button></td>`
        : '';
      row.innerHTML = `<td>${rank}</td><td>${escapeHtml(d.pseudo || '—')}</td><td>${d.level}</td><td>${d.time}s</td>${deleteCell}`;
      body.appendChild(row);
      rank++;
    });

    if (isAdmin) {
      document.querySelectorAll('.admin-delete').forEach(btn => {
        btn.addEventListener('click', async () => {
          const confirmMsg = getLang() === 'fr' ? 'Supprimer ce score du classement ?' : 'Remove this score from the leaderboard?';
          if (!confirm(confirmMsg)) return;
          await deleteDoc(doc(db, "scores", btn.getAttribute('data-uid')));
          loadBoard();
        });
      });
    }
  } catch (err) {
    loading.style.display = 'block';
    loading.textContent = (getLang() === 'fr' ? 'Erreur de chargement : ' : 'Loading error: ') + err.message;
  }
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
</script>
</body>
</html>
